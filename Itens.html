<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itens</title>
    <meta name="google" content="notranslate" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <div class="sidebar">
      <a id="inicio-link" href="html.html" class="notranslate" translate="no"
        >Início</a
      >
      <a href="Grupos.html" class="notranslate" translate="no">Grupos</a>
      <a href="Integrantes.html" class="notranslate" translate="no"
        >Integrantes</a
      >
      <a href="Itens.html" class="notranslate" translate="no">Itens</a>
    </div>
    <main>
      <h1 class="center" style="color: #f0f0f0">Itens</h1>
      <section id="itens-section">
        <button id="add-item-btn" class="add-item-btn">
          ➕ Adicionar Item
        </button>
        <div id="itens-container"></div>
      </section>
    </main>

    <!-- Modal for creating items -->
    <div id="item-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h2 style="color: #f0f0f0; margin-top: 0">Novo Item</h2>

        <label style="color: #eee">Nome do Item:</label>
        <input
          type="text"
          id="item-name"
          class="modal-input"
          placeholder="Digite o nome do item"
        />

        <div class="modal-buttons">
          <button id="save-item-btn" class="modal-btn-save">Salvar</button>
          <button id="cancel-item-btn" class="modal-btn-cancel">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for editing item details -->
    <div id="item-details-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h2 style="color: #f0f0f0; margin-top: 0">Detalhes do Item</h2>
        <div
          id="modal-item-image-container"
          style="text-align: center; margin-bottom: 1rem"
        ></div>
        <p><strong>Nome:</strong> <span id="modal-item-name"></span></p>
        <label style="color: #eee">Descrição:</label>
        <textarea id="modal-item-desc" class="modal-input" rows="10"></textarea>
        <div class="modal-buttons">
          <button id="modal-item-save" class="modal-btn-save">Salvar</button>
          <button id="modal-item-cancel" class="modal-btn-cancel">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
